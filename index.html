<!DOCTYPE html>
<html>
<body>

<h1>My Shop</h1>

<input type="text" id="search" placeholder="Search..." onkeyup="searchProduct()">

<div id="products"></div>

<h2>Cart</h2>
<ul id="cart"></ul>

<script>
const products = [
  {name: "T-Shirt", img: "https://via.placeholder.com/100"},
  {name: "Shoes", img: "https://via.placeholder.com/100"},
  {name: "Bag", img: "https://via.placeholder.com/100"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function showProducts(list) {
  let output = "";
  list.forEach(p => {
    output += `
      <div>
        <img src="${p.img}">
        <p>${p.name}</p>
        <button onclick="addToCart('${p.name}')">Add</button>
      </div>
    `;
  });
  document.getElementById("products").innerHTML = output;
}

function addToCart(item) {
  cart.push(item);
  localStorage.setItem("cart", JSON.stringify(cart));
  showCart();
}

function showCart() {
  let output = "";
  cart.forEach(c => {
    output += `<li>${c}</li>`;
  });
  document.getElementById("cart").innerHTML = output;
}

function searchProduct() {
  let value = document.getElementById("search").value.toLowerCase();
  let filtered = products.filter(p => p.name.toLowerCase().includes(value));
  showProducts(filtered);
}

showProducts(products);
showCart();
</script>

</body>
</html>
